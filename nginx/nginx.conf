upstream auth-service      { server auth-service:8081; }
upstream dashboard-service { server dashboard-service:8082; }
upstream stock-service     { server stock-service:8083; }

server {
    listen 3000;

    # ── Auth ──────────────────────────────────────────────────────────────────
    location /api/auth/ {

        # Preflight — return immediately without touching the backend.
        # This way CORS works even while a service is restarting.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      'http://localhost:4200';
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age'           '86400';
            return 204;
        }

        # Strip any CORS headers the Spring app adds to avoid duplicates.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Add CORS to every response, including 4xx / 5xx, so the browser
        # always sees the real error code instead of a misleading CORS error.
        add_header 'Access-Control-Allow-Origin'      'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://auth-service/api/auth/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Dashboard ─────────────────────────────────────────────────────────────
    location /api/dashboard/ {

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      'http://localhost:4200';
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age'           '86400';
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header 'Access-Control-Allow-Origin'      'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://dashboard-service/api/dashboard/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }

    # ── Stocks ────────────────────────────────────────────────────────────────
    # No trailing slash so both /api/stocks and /api/stocks?search=x match.
    location /api/stocks {

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      'http://localhost:4200';
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age'           '86400';
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header 'Access-Control-Allow-Origin'      'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://stock-service/api/stocks;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization   $http_authorization;
    }
}
