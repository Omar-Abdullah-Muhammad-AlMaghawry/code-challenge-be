upstream auth-service      { server auth-service:8081; }
upstream dashboard-service { server dashboard-service:8082; }
upstream stock-service     { server stock-service:8083; }

server {
    listen 3000;

    location /api/auth/ {
        proxy_pass         http://auth-service/api/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/dashboard/ {
        proxy_pass         http://dashboard-service/api/dashboard/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }

    location /api/stocks {
        proxy_pass         http://stock-service/api/stocks;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
    }
}
